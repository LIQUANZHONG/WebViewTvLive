name: Android Build Workflow

# 触发条件，这里设置为推送代码到main分支或者推送以v开头的tag时触发工作流
on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build_apk:
    # 运行环境选择Ubuntu最新版本
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 拉取仓库代码
      - uses: actions/checkout@v3

      # 2. 设置Java运行环境，这里选用Temurin发行版，Java版本为17（根据项目需求调整）
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. 设置Gradle环境，并执行构建APK的命令（assembleRelease用于构建发布版本的APK）
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          arguments: assembleRelease

      # 4. 可选步骤：运行单元测试（如果项目有单元测试用例的话）
      # - name: Run unit tests
      #   run:./gradlew test

      # 5. 输出构建结果信息（例如APK文件所在目录等），方便查看构建情况
      - name: Show build results
        run: |
          echo "APK files are located in app/build/outputs/apk/release"
          ls app/build/outputs/apk/release
