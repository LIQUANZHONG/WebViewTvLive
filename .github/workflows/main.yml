name: Build APK

# Trigger the workflow on push or pull request events to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code from the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up JDK (assuming you're using OpenJDK 11)
      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adoptopenjdk'

      # Step 3: Cache Gradle dependencies to speed up builds
      - name: Cache Gradle dependencies
        uses: actions/cache@v2
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: Build the APK
      - name: Build APK
        run: ./gradlew assembleRelease # For release APK, use assembleRelease or for debug, use assembleDebug

      # Step 5: Upload APK with updated version of actions/upload-artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3  # Updated to v3
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk # Adjust the path based on your build configuration
