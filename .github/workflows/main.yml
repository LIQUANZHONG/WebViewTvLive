name: Android Build and Release Workflow

# 触发条件，这里设置为推送代码到 main 分支或者推送以 v 开头的 tag 时触发工作流
on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 拉取仓库代码
      - uses: actions/checkout@v3
        name: Checkout Code

      # 2. 设置 Java 环境
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
        name: Setup Java

      # 3. 设置 Gradle 环境并构建 APK
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          arguments: assembleRelease
        name: Build APK

      # 4. 签名 APK
      - name: Sign APK
        run: |
          # 使用 r0adkll/sign-android-release@v1 里的逻辑，拆分成命令形式
          release_dir="app/build/outputs/apk/release"
          signing_key_base64="${{ secrets.RELASE_TOKEN }}"
          alias="${{ secrets.ALIAS }}"
          key_store_password="${{ secrets.KEY_TORE_PASSWORD }}"
          key_password="${{ secrets.KEY_PASSWORD }}"
          build_tools_version="34.0.0"
          # 实际签名命令，此处只是示例，需按准确语法调整
          apksigner sign --ks-pass pass:$key_store_password --key-pass pass:$key_password --ks $signing_key_base64 --out signed.apk $release_dir/unsigned.apk
        env:
          BUILD_TOOLS_VERSION: $build_tools_version

      # 5. 检查签名是否成功，若失败则详细记录错误信息并继续流程
      - if: ${{ failure() }}
        name: Check Signing Failure
        run: |
          echo "APK signing failed. Check the detailed error logs."
          # 尝试获取更多关于签名失败的信息，例如查看日志文件（假设签名步骤有相关日志输出）
          if [ -f "path/to/signing_log.txt" ]; then
            cat "path/to/signing_log.txt"
          fi
          # 或者查看相关工具的错误码等信息（如果能获取到）
          echo "Exit code of signing process: $?"

      # 6. 命名 APK
      - run: |
          apk_file=$(ls signed.apk 2>/dev/null)
          if [ -n "$apk_file" ]; then
            mv "$apk_file" "myapp_$GITHUB_REF_NAME.apk"
          else
            echo "Signed APK file not found. Signing step might have failed."
          

      # 7. 发布 APK 到 GitHub Releases 页面
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "*.apk"
          token: ${{ github.token }}
          generateReleaseNotes: true
        name: Release APK
