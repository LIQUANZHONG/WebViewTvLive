name: Android Build and Release Workflow

# 触发条件，这里设置为推送代码到 main 分支或者推送以 v 开头的 tag 时触发工作流
on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build_and_release:
    # 运行环境选择 Ubuntu 最新版本
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 拉取仓库代码
      - uses: actions/checkout@v3

      # 2. 设置 Java 运行环境，这里选用 Temurin 发行版，Java 版本为 17（根据项目需求调整）
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. 设置 Gradle 环境，并执行构建 APK 的命令（assembleRelease 用于构建发布版本的 APK）
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: current
          arguments: assembleRelease

      # 4. 签名 APK（假设你有相关的签名配置，以下是一个示例，需要将敏感信息存到 GitHub Secrets 中）
      - uses: r0adkll/sign-android-release@v1
        name: Sign app APK
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.RELASE_TOKEN }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_TORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # 5. 命名 APK（可根据实际需求自定义命名规则，这里以包含 tag 或分支名为例）
      - run: mv ${{steps.sign_app.outputs.signedReleaseFile}} myapp_$GITHUB_REF_NAME.apk

      # 6. 发布 APK 到 GitHub Releases 页面
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "*.apk"
          token: ${{ github.token }}
          generateReleaseNotes: true
